<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Sistema - Vulnerable a SQLi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #c9d1d9;
        }

        .login-container {
            background: #161b22;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 380px;
            border: 1px solid #30363d;
        }

        h1 {
            text-align: center;
            color: #f0f6fc;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        p.subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #c9d1d9;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            background-color: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #58a6ff;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #238636;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: #2ea043;
        }

        .error {
            color: #ff7b72;
            background-color: rgba(255, 123, 114, 0.1);
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 123, 114, 0.4);
            font-size: 0.9rem;
        }

        .demo-note {
            background-color: rgba(56, 139, 253, 0.1);
            color: #58a6ff;
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            border: 1px solid rgba(56, 139, 253, 0.4);
            text-align: center;
        }

        code {
            background-color: rgba(110, 118, 129, 0.4);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>Iniciar Sesión</h1>
        <p class="subtitle">Portal Corporativo Interno</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" placeholder="Ingrese su usuario" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>
            <button type="submit">Ingresar</button>
        </form>

        <div class="demo-note">
            <strong>Administación Base Datos:</strong> Ingrese el Usuario y Contraseña
            <br><code>User - Password</code><br> en los campos requeridos.
        </div>
    </div>
</body>

</html>
